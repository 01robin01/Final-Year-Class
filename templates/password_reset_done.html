<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Email Sent | Khojne Sathi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
    }
    .auth-card {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.25);
      text-align: center;
    }
    .logo-icon {
      width: 60px;
      height: 60px;
      background: #dbeafe;
      color: #2563eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
    }
    .btn-primary:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo-icon">
      <i class="bi bi-envelope-check"></i>
    </div>
    <h5 class="fw-bold mb-2">Check Your Email</h5>
    <p class="text-muted small mb-4">
      We've sent an email with instructions to reset your password. Please check your inbox and spam folder.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary w-100">
      Back to Login
    </a>
  </div>
</body>
</html>
