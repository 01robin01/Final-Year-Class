<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f4f4; padding: 20px;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                    <tr>
                        <td style="background-color: #4f46e5; padding: 20px; text-align: center; color: #ffffff; font-size: 24px; font-weight: bold;">
                            Khojne Sathi
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 30px; text-align: center; color: #333333;">
                            <h2 style="font-size: 20px; margin-bottom: 20px;">Password Reset Request</h2>
                            <p style="font-size: 16px; line-height: 1.5; margin-bottom: 20px;">
                                We received a request to reset your password. Click the button below to choose a new password.
                            </p>
                            <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" style="display: inline-block; background-color: #4f46e5; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-size: 16px; font-weight: bold;">Reset Password</a>
                            <p style="font-size: 14px; line-height: 1.5; margin-top: 30px; color: #777777;">
                                If you did not request a password reset, please ignore this email. This link will expire shortly.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: #f9f9f9; padding: 15px; text-align: center; color: #aaaaaa; font-size: 12px;">
                            &copy; 2026 Khojne Sathi. All rights reserved.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
